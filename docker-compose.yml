version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: url-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - url-network

  url-shortener:
    build: .
    container_name: url-shortener
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    networks:
      - url-network

networks:
  url-network:
    driver: bridge

volumes:
  mongo_data: